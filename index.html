<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Product Design Audit</title>
  <style>
    :root {
      --primary-green: #d1ff82; /* The neon green from the image */
      --bg-gray: #e5e7eb;
      --text-main: #000000;
      --text-muted: #6b7280;
    }

    * { box-sizing: border-box; }
    
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; 
      background: var(--bg-gray); 
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* SHORT CIRCULAR NAV BAR */
    nav {
      background: white;
      padding: 8px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 50px; /* Makes it circular/pill shaped */
      width: 100%;
      max-width: 500px;
      margin-bottom: 40px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    nav .brand {
      font-weight: 800;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }

    /* FORM CARD - Matching the Screenshot */
    .form-card {
      background: white;
      width: 100%;
      max-width: 550px;
      padding: 40px;
      border-radius: 32px; /* Large rounded corners */
      box-shadow: 0 10px 40px rgba(0,0,0,0.03);
    }

    .step-indicator {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 4px;
      background: #f0f0f0;
      width: 100%;
      border-radius: 2px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-fill {
      width: 50%; /* Adjust based on step */
      height: 100%;
      background: var(--primary-green);
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      margin: 0 0 12px 0;
      letter-spacing: -1px;
    }

    .welcome-text {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 30px;
    }

    /* INPUT STYLING */
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input[type="email"], input[type="text"] {
      width: 100%;
      padding: 14px 18px;
      margin-bottom: 25px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: #000; }

    /* PILL OPTIONS (The "Job Type" style) */
    .options-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 30px;
    }

    .option-pill {
      border: 1px solid #e5e7eb;
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 13px;
      cursor: pointer;
      background: white;
      transition: all 0.2s;
    }

    .option-pill:hover { border-color: #000; }

    input[type="radio"] { display: none; }
    input[type="radio"]:checked + .option-pill {
      background: #f3f4f6;
      border-color: #000;
      font-weight: 600;
    }

    /* BUTTONS */
    .button-group {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      padding: 12px 30px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: transform 0.1s;
    }

    .btn-back { background: #f3f4f6; color: #000; }
    .btn-next { background: var(--primary-green); color: #000; }
    .btn:active { transform: scale(0.98); }

    .result-box {
      display: none;
      background: #000;
      color: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <nav>
    <div class="brand">SaaS Audit</div>
    <a href="https://abubakriqbal.design" target="_blank">Contact</a>
  </nav>

  <div class="form-card">
    <div id="resultBox" class="result-box"></div>

    <div class="step-indicator">Step 2/4</div>
    <div class="progress-bar"><div class="progress-fill"></div></div>

    <h1>Design Audit Quiz</h1>
    <p class="welcome-text">Complete the questions below so we can tailor your search and recommendations.</p>

    <label>Email Address</label>
    <input type="email" id="email" placeholder="e.g. alex@example.com" required>

    <form id="quizForm">
      <div id="questions"></div>
      
      <div class="button-group">
        <button type="button" class="btn btn-back">Back</button>
        <button type="button" class="btn btn-next" onclick="submitQuiz()">Submit Audit</button>
      </div>
    </form>
  </div>

<script>
const quizData = [
  {q:"1. What is the capital of France?", options:["London","Berlin","Paris"], answer:2},
  {q:"2. Which language is used for styling?", options:["HTML","CSS","Python"], answer:1},
  {q:"3. Earth is a...", options:["Star","Planet","Galaxy"], answer:1}
];

const questionsDiv = document.getElementById("questions");

quizData.forEach((item,index)=>{
  let html = `<div class="question-container" style="margin-bottom:25px;">
                <label>${item.q}</label>
                <div class="options-grid">`;
  item.options.forEach((opt,i)=>{
    html += `
      <label>
        <input type="radio" name="q${index}" value="${i}">
        <span class="option-pill">${opt}</span>
      </label>`;
  });
  html += `</div></div>`;
  questionsDiv.innerHTML += html;
});

function submitQuiz(){
  const email = document.getElementById("email").value;
  if(!email) { alert("Please enter your email."); return; }

  let score = 0;
  quizData.forEach((item,index)=>{
    const selected = document.querySelector(`input[name='q${index}']:checked`);
    if(selected && parseInt(selected.value) === item.answer) score++;
  });

  const resultBox = document.getElementById("resultBox");
  resultBox.innerHTML = `Audit Complete! Your Score: ${score} / ${quizData.length}`;
  resultBox.style.display = "block";
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

</body>
</html>
