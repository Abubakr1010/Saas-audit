<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Product Design Audit</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: Arial, sans-serif; 
      margin:0; 
      background:#f2f2f2; 
      color:#333;
    }

    /* NAVBAR */
    nav {
      background:#111;
      color:white;
      padding:15px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    nav .brand {
      font-size:18px;
      font-weight:bold;
      letter-spacing:1px;
    }

    nav .nav-links a {
      color:white;
      text-decoration:none;
      margin-left:20px;
      font-size:14px;
    }

    /* MAIN WRAPPER */
    .wrapper {
      max-width:800px;
      margin:50px auto;
      padding:0 20px;
    }

    /* FORM CARD */
    .form-card {
      background:#e9e9e9;
      padding:40px;
      border-radius:8px;
    }

    .form-card h1 {
      margin-top:0;
      font-size:28px;
    }

    .welcome-text {
      margin-bottom:30px;
      font-size:15px;
      color:#555;
    }

    .result-box {
      display:none;
      background:#111;
      color:white;
      padding:15px;
      border-radius:6px;
      margin-bottom:25px;
      font-size:18px;
      font-weight:bold;
    }

    input[type="email"] {
      width:100%;
      padding:10px;
      margin-bottom:25px;
      border:1px solid #ccc;
      border-radius:4px;
    }

    .question {
      margin-bottom:20px;
      padding-bottom:15px;
      border-bottom:1px solid #d0d0d0;
    }

    .question p {
      font-weight:bold;
      margin-bottom:8px;
    }

    button {
      margin-top:20px;
      padding:12px 25px;
      background:#111;
      color:white;
      border:none;
      border-radius:4px;
      cursor:pointer;
    }

    button:hover {
      opacity:0.85;
    }

    .social {
      margin-top:20px;
      display:none;
    }

    .social a {
      margin-right:15px;
      text-decoration:none;
      font-size:14px;
      color:#111;
    }
  </style>
</head>
<body>

  <nav>
    <div class="brand">SaaS Audit</div>
    <div class="nav-links">
      <a href="https://abubakriqbal.design" target="_blank">Contact</a>
    </div>
  </nav>

  <div class="wrapper">
    <div class="form-card">

      <!-- SCORE RESULT AT TOP -->
      <div id="resultBox" class="result-box"></div>

      <h1>SaaS Product Design Audit</h1>
      <p class="welcome-text">Welcome! Please complete this short design audit. Enter your email below and answer all 10 questions.</p>

      <label><strong>Email Address</strong></label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <form id="quizForm">
        <div id="questions"></div>
        <button type="button" onclick="submitQuiz()">Submit Audit</button>
      </form>

      <div class="social" id="socialIcons">
        <a href="https://facebook.com" target="_blank">Facebook</a>
        <a href="https://twitter.com" target="_blank">Twitter</a>
        <a href="https://linkedin.com" target="_blank">LinkedIn</a>
      </div>

    </div>
  </div>

<script>
const quizData = [
  {q:"1. What is 2 + 2?", options:["3","4","5"], answer:1},
  {q:"2. Capital of France?", options:["London","Berlin","Paris"], answer:2},
  {q:"3. Sun rises from?", options:["West","East","North"], answer:1},
  {q:"4. 5 x 3 = ?", options:["15","10","20"], answer:0},
  {q:"5. HTML stands for?", options:["Hyper Text Markup Language","High Text Machine Language","Home Tool Markup Language"], answer:0},
  {q:"6. CSS used for?", options:["Styling","Database","Server"], answer:0},
  {q:"7. JS stands for?", options:["JavaSource","JavaScript","JustScript"], answer:1},
  {q:"8. 10 / 2 = ?", options:["2","5","10"], answer:1},
  {q:"9. Color of sky?", options:["Blue","Green","Red"], answer:0},
  {q:"10. Earth is a?", options:["Star","Planet","Galaxy"], answer:1}
];

const questionsDiv = document.getElementById("questions");

quizData.forEach((item,index)=>{
  let html = `<div class="question"><p>${item.q}</p>`;
  item.options.forEach((opt,i)=>{
    html += `<label><input type="radio" name="q${index}" value="${i}"> ${opt}</label><br>`;
  });
  html += `</div>`;
  questionsDiv.innerHTML += html;
});

function submitQuiz(){
  const email = document.getElementById("email").value;
  if(email === ""){
    alert("Please enter your email.");
    return;
  }

  let score = 0;

  quizData.forEach((item,index)=>{
    const selected = document.querySelector(`input[name='q${index}']:checked`);
    if(selected && parseInt(selected.value) === item.answer){
      score += 1;
    }
  });

  const resultBox = document.getElementById("resultBox");
  resultBox.innerHTML = `Your Score: ${score} / 10`;
  resultBox.style.display = "block";

  document.getElementById("socialIcons").style.display = "block";

  window.scrollTo({ top: 0, behavior: 'smooth' });

  fetch("YOUR_GOOGLE_SCRIPT_WEB_APP_URL", {
    method: "POST",
    body: JSON.stringify({ email: email, score: score }),
    headers: { "Content-Type": "application/json" }
  })
  .then(res => console.log("Saved to sheet"))
  .catch(err => console.error(err));
}
</script>

</body>
</html>
