<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Product Design Audit</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-green: #d1ff82; 
      --bg-gray: #f3f4f6;
      --text-main: #000000;
      --text-muted: #6b7280;
    }

    * { box-sizing: border-box; }
    
    body { 
      font-family: 'Inter', sans-serif; 
      margin: 0; background: var(--bg-gray); color: var(--text-main);
      display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
    }

    nav, .form-card { width: 100%; max-width: 800px; }

    nav {
      background: white; padding: 12px 40px; display: flex; justify-content: space-between;
      align-items: center; border-radius: 60px; margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .brand { font-weight: 800; font-size: 16px; text-transform: uppercase; }

    .chat-btn {
      background: #000; color: #fff; padding: 10px 24px; border-radius: 50px;
      text-decoration: none; font-size: 13px; font-weight: 600; transition: 0.3s;
    }
    .chat-btn:hover { background: var(--primary-green); color: #000; }

    .form-card {
      background: white; padding: 60px; border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.04);
    }

    h1 { font-size: 42px; font-weight: 800; margin: 0 0 10px 0; letter-spacing: -2px; }
    .welcome-text { font-size: 16px; color: var(--text-muted); margin-bottom: 40px; }

    .input-group { margin-bottom: 25px; }
    label.field-label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; }

    input[type="email"], input[type="text"] {
      width: 100%; height: 48px; padding: 0 18px; border: 1.5px solid #eee;
      border-radius: 12px; font-size: 15px; outline: none; transition: 0.2s;
    }
    input:focus { border-color: var(--text-main); }

    .question-block { margin: 45px 0; }
    .question-text { font-weight: 700; font-size: 18px; margin-bottom: 20px; display: block; }
    .options-row { display: flex; gap: 15px; }
    
    .option-pill {
      flex: 1; text-align: center; padding: 14px; border: 1.5px solid #eee;
      border-radius: 50px; cursor: pointer; transition: 0.2s; font-weight: 500;
    }
    input[type="radio"]:checked + .option-pill { background: #000; color: #fff; }
    input[type="radio"] { display: none; }

    .btn-finish {
      width: 100%; height: 56px; background: var(--primary-green); border: none;
      border-radius: 18px; font-weight: 800; font-size: 16px; cursor: pointer;
    }
    .btn-finish:disabled { background: #eee; cursor: not-allowed; }

    #resultBox { 
      display: none; background: #000; color: var(--primary-green); 
      padding: 20px; border-radius: 20px; margin-bottom: 30px; text-align: center; font-weight: 800;
    }
  </style>
</head>
<body>

  <nav>
    <div class="brand">SaaS Audit</div>
    <a href="https://abubakriqbal.design" target="_blank" class="chat-btn">Chat with Professionals</a>
  </nav>

  <div class="form-card">
    <div id="resultBox"></div>
    <h1>Role Discovery</h1>
    <p class="welcome-text">Complete this audit to unlock personalized recommendations.</p>

    <form id="auditForm">
      <div class="input-group">
        <label class="field-label">Full Name (Optional)</label>
        <input type="text" id="userName" placeholder="Alex Graham">
      </div>

      <div class="input-group">
        <label class="field-label">Work Email Address *</label>
        <input type="email" id="userEmail" placeholder="name@company.com" required>
      </div>

      <div class="input-group">
        <label class="field-label">Website / Figma or Framer link (Optional)</label>
        <input type="text" id="userWebsite" placeholder="https://figma.com/file/...">
      </div>

      <div id="questionsContainer"></div>

      <button type="submit" id="submitBtn" class="btn-finish">Finish Audit</button>
    </form>
  </div>

<script>
// Quiz Configuration
const quizData = [
  {q: "Are you targeting leadership roles?", options: ["Yes", "No"], answer: 0},
  {q: "Is remote work a dealbreaker for you?", options: ["Yes", "No"], answer: 0},
  {q: "Are you open to freelance work?", options: ["Yes", "No"], answer: 1}
];

// Build Quiz Questions
const container = document.getElementById("questionsContainer");
quizData.forEach((item, idx) => {
  container.innerHTML += `
    <div class="question-block">
      <span class="question-text">${item.q}</span>
      <div class="options-row">
        ${item.options.map((opt, i) => `
          <label style="flex:1">
            <input type="radio" name="q${idx}" value="${i}" required>
            <div class="option-pill">${opt}</div>
          </label>
        `).join('')}
      </div>
    </div>`;
});

// Form Submission Logic
document.getElementById("auditForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const btn = document.getElementById("submitBtn");
  btn.innerText = "Processing...";
  btn.disabled = true;

  // 1. Calculate Score
  let score = 0;
  quizData.forEach((item, idx) => {
    const selected = document.querySelector(`input[name='q${idx}']:checked`);
    if(selected && parseInt(selected.value) === item.answer) score++;
  });

  // 2. Prepare the data
  const name = encodeURIComponent(document.getElementById("userName").value || "N/A");
  const email = encodeURIComponent(document.getElementById("userEmail").value);
  const website = encodeURIComponent(document.getElementById("userWebsite").value || "N/A");
  const finalScore = encodeURIComponent(score);

  // 3. YOUR NEW DEPLOYMENT URL (Must be the URL from the 'doGet' script)
  const baseURL = "https://script.google.com/macros/s/AKfycbyNrqFmejk1AvmUPzRH0sQtUEA5phJqwfu3Rg9wxiIm1OvxVdgd4FpO8kV0Dvg411WP/exec";
  
  // 4. Construct the Magic Link
  const finalURL = `${baseURL}?name=${name}&email=${email}&website=${website}&score=${finalScore}`;

  // 5. Send it via "Hidden Image" fetch (Bulletproof method)
  const logger = new Image();
  logger.src = finalURL;

  // 6. UI Update (Success Message)
  setTimeout(() => {
    document.getElementById("resultBox").style.display = "block";
    document.getElementById("resultBox").innerHTML = `🎉 Audit Sent! Score: ${score} / 3`;
    btn.innerText = "Audit Submitted";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 1000);
});
</script>

</body>
</html>
