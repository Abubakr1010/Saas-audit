<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Product Design Audit</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-green: #d1ff82; 
      --bg-gray: #f3f4f6;
      --text-main: #000000;
      --text-muted: #6b7280;
    }

    * { box-sizing: border-box; }
    
    body { 
      font-family: 'Inter', sans-serif; 
      margin: 0; 
      background: var(--bg-gray); 
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* NAV BAR & FORM WIDTH (800px) */
    nav, .form-card {
      width: 100%;
      max-width: 800px;
    }

    nav {
      background: white;
      padding: 12px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 60px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .brand { 
      font-weight: 800; 
      font-size: 16px; 
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }

    .know-more-btn {
      background: #eee;
      color: #000;
      padding: 10px 24px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: 0.3s;
    }

    .know-more-btn:hover {
      background: var(--text-main);
      color: white;
    }

    /* FORM CARD */
    .form-card {
      background: white;
      padding: 60px;
      border-radius: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.04);
    }

    h1 { 
      font-size: 42px; 
      font-weight: 800; 
      margin: 0 0 15px 0; 
      letter-spacing: -2px; 
      line-height: 1;
    }

    .welcome-text { 
      font-size: 16px; 
      color: var(--text-muted); 
      margin-bottom: 45px; 
      line-height: 1.5; 
      max-width: 500px;
    }

    /* INPUTS AT 48px HEIGHT */
    .input-group { margin-bottom: 25px; }
    label.field-label { 
      display: block; 
      font-size: 14px; 
      font-weight: 700; 
      margin-bottom: 10px; 
    }

    input[type="email"], input[type="text"] {
      width: 100%;
      height: 48px;
      padding: 0 18px;
      border: 1.5px solid #ebebeb;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    input:focus { border-color: var(--text-main); background: #fafafa; }

    /* QUESTIONS & ANSWERS SPACING */
    .question-block { margin-top: 50px; margin-bottom: 50px; }
    .question-text { 
      font-weight: 700; 
      font-size: 18px; 
      margin-bottom: 25px; 
      display: block; 
      letter-spacing: -0.5px;
    }

    .options-row { display: flex; gap: 15px; }
    
    .option-pill {
      flex: 1;
      text-align: center;
      padding: 14px;
      border: 1.5px solid #ebebeb;
      border-radius: 50px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 500;
    }

    input[type="radio"]:checked + .option-pill {
      background: var(--text-main);
      border-color: var(--text-main);
      color: white;
      font-weight: 600;
    }

    input[type="radio"] { display: none; }

    /* SUBMIT BUTTON */
    .btn-finish {
      width: 100%;
      height: 56px;
      background: var(--primary-green);
      border: none;
      border-radius: 18px;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .btn-finish:hover { transform: translateY(-3px); filter: brightness(1.05); }
    .btn-finish:disabled { background: #eee; cursor: not-allowed; transform: none; }

    /* RESULT SCORE BOX */
    #resultBox {
      display: none;
      background: var(--text-main);
      color: var(--primary-green);
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 30px;
      text-align: center;
      font-weight: 800;
      font-size: 20px;
      animation: slideDown 0.5s ease;
    }

    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="brand">SaaS Audit</div>
    <a href="https://abubakriqbal.design" target="_blank" class="know-more-btn">Know More</a>
  </nav>

  <div class="form-card">
    <div id="resultBox"></div>

    <h1>Role Discovery</h1>
    <p class="welcome-text">Complete this audit to unlock personalized recommendations and salary benchmarks.</p>

    <form id="auditForm">
      <div class="input-group">
        <label class="field-label">Full Name</label>
        <input type="text" id="userName" placeholder="e.g. Alex Graham">
      </div>

      <div class="input-group">
        <label class="field-label">Work Email Address *</label>
        <input type="email" id="userEmail" placeholder="name@company.com" required>
      </div>

      <div class="input-group">
        <label class="field-label">Website</label>
        <input type="text" id="userWebsite" placeholder="https://yourwebsite.com">
      </div>

      <div id="questionsContainer"></div>

      <button type="submit" id="submitBtn" class="btn-finish">Finish Audit</button>
    </form>
  </div>

<script>
// Quiz data with Yes/No questions
const quizData = [
  {q: "Are you targeting leadership roles?", options: ["Yes", "No"], answer: 0},
  {q: "Is remote work a dealbreaker for you?", options: ["Yes", "No"], answer: 0},
  {q: "Are you open to contract or freelance work?", options: ["Yes", "No"], answer: 1}
];

const container = document.getElementById("questionsContainer");

// Render the questions
quizData.forEach((item, idx) => {
  let html = `
    <div class="question-block">
      <span class="question-text">${item.q}</span>
      <div class="options-row">
        ${item.options.map((opt, i) => `
          <label style="flex:1">
            <input type="radio" name="q${idx}" value="${i}" required>
            <div class="option-pill">${opt}</div>
          </label>
        `).join('')}
      </div>
    </div>`;
  container.innerHTML += html;
});

// Form Submission Logic
document.getElementById("auditForm").addEventListener("submit", function(e) {
  e.preventDefault();
  
  const btn = document.getElementById("submitBtn");
  btn.innerText = "Sending to Sheet...";
  btn.disabled = true;

  let score = 0;
  quizData.forEach((item, idx) => {
    const selected = document.querySelector(`input[name='q${idx}']:checked`);
    if(selected && parseInt(selected.value) === item.answer) {
      score += 1;
    }
  });

  const payload = {
    name: document.getElementById("userName").value || "Not provided",
    email: document.getElementById("userEmail").value,
    website: document.getElementById("userWebsite").value || "None",
    score: score
  };

  // Your Google Apps Script URL
  const scriptURL = "https://script.google.com/macros/s/AKfycbyNrqFmejk1AvmUPzRH0sQtUEA5phJqwfu3Rg9wxiIm1OvxVdgd4FpO8kV0Dvg411WP/exec";

  fetch(scriptURL, {
    method: "POST",
    mode: 'no-cors', // Important for Google Scripts
    body: JSON.stringify(payload)
  })
  .then(() => {
    // Show Animation & Result
    const resultBox = document.getElementById("resultBox");
    resultBox.innerHTML = `🎉 Audit Complete! Your Score: ${score} / ${quizData.length}`;
    resultBox.style.display = "block";
    
    btn.innerText = "Audit Submitted";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  })
  .catch(err => {
    console.error('Error!', err.message);
    alert("There was an error submitting. Please try again.");
    btn.innerText = "Finish Audit";
    btn.disabled = false;
  });
});
</script>

</body>
</html>
